<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BeyondForce</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    .container {
      margin: 0;
      height: 70vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
      font-family: Roboto, "Helvetica Neue", sans-serif;
      color: #333;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      color: var(--text-color);
      margin-bottom: 2.2rem;
    }

    p {
      font-size: 1.1rem;
      color: #666;
    }
    @media (max-width: 62rem) {
        h1 {
            font-size: 1.5rem;
        }

        p {
            font-size: 1.0rem;
            color: #666;
        }
    }

  </style>
</head>

<body>
  <div class="container">
    <div>
        <h1>This page is beyond reach… for now.</h1>
        <p>We’re building something beyonds here. Check back soon.</p>
    </div>
  </div>
</body>
</html>
