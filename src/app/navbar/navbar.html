<header class="navbar">
  <div class="logo">
    <mat-icon aria-hidden="false" aria-label="Home" fontIcon="menu" class="menu" (click)="onMenuClick()"></mat-icon>
    <a routerLink="/">
      <img src="logo.svg" height="24" />
    </a>
    <a class="no-decoration" routerLink="/">
      <span class="logo-text"><b>Beyond</b>Force</span>
    </a>
  </div>

  <nav class="nav-links">
    <a routerLink="/"
      ><mat-icon
        aria-hidden="false"
        aria-label="Home"
        fontIcon="home"
      ></mat-icon
    ></a>
    <span
      class="material-symbols-outlined reading-mode-icon"
      (click)="toggleReadingMode()"
    >
      {{ sunglassIcon }}
    </span>
  </nav>
</header>
