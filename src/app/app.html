<div class="app-container" [class.reading-mode]="isReadingMode">
  <!-- Navigation Bar -->
  <app-navbar (menuClick)="toggleSidebar()"></app-navbar>

  <!-- Main Content Area with Sidebar and Router Outlet -->
  <div class="layout">
    <app-sidebar [class.open]="isSidebarOpen" (treeNodeClick)="toggleSidebar()"></app-sidebar>
    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Footer -->
  <app-footer></app-footer>
</div>
